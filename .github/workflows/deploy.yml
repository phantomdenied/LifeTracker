name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug problem characters
        run: |
          python3 - <<'PYEOF'
          import glob
          for pattern in ['src/**/*.jsx', 'src/**/*.js']:
              for path in glob.glob(pattern, recursive=True):
                  text = open(path, encoding='utf-8').read()
                  for i, ch in enumerate(text):
                      if ord(ch) > 127:
                          line_no = text[:i].count('\n') + 1
                          print(f'{path}:{line_no} U+{ord(ch):04X} {repr(ch)} context={repr(text[max(0,i-10):i+10])}')
          PYEOF

      - name: Fix smart quotes
        run: |
          python3 - <<'PYEOF'
          import glob, unicodedata
          replacements = {
              '\u2018': "'", '\u2019': "'",
              '\u201a': "'", '\u201b': "'",
              '\u201c': '"', '\u201d': '"',
              '\u201e': '"', '\u201f': '"',
              '\u2032': "'", '\u2033': '"',
              '\u2026': '...', '\u22ef': '...',
              '\u2010': '-', '\u2011': '-',
              '\u2012': '-', '\u2013': '-', '\u2014': '--',
          }
          for pattern in ['src/**/*.jsx', 'src/**/*.js', 'src/*.jsx', 'src/*.js']:
              for path in glob.glob(pattern, recursive=True):
                  text = open(path, encoding='utf-8').read()
                  fixed = text
                  for bad, good in replacements.items():
                      fixed = fixed.replace(bad, good)
                  # Also check for any remaining non-ASCII in import lines
                  lines = fixed.split('\n')
                  for i, line in enumerate(lines):
                      if line.startswith('import') or line.startswith('const ') or line.startswith('export'):
                          clean = ''
                          for ch in line:
                              if ord(ch) > 127:
                                  print(f'  Replacing ord={ord(ch)} U+{ord(ch):04X} in: {repr(line[:60])}')
                                  if ord(ch) in (0x2026, 0x22ef, 0xfe19, 0x2025):
                                      clean += '...'
                                  elif unicodedata.category(ch).startswith('P') or unicodedata.category(ch).startswith('Z'):
                                      clean += ' '
                                  else:
                                      clean += ch
                              else:
                                  clean += ch
                          lines[i] = clean
                  fixed = '\n'.join(lines)
                  if fixed != text:
                      open(path, 'w', encoding='utf-8').write(fixed)
                      print(f'Fixed: {path}')
          PYEOF

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
